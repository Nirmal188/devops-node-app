name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devops-node-app

jobs:

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Integration Tests
        run: npm run test:integration

      - name: Run All Tests with Coverage
        run: npm test

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Start App and Run E2E Tests
        run: |
          node src/server.js &
          sleep 8
          npx playwright test tests/e2e
      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          
  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: devops-node-app
          path: '.'
          format: HTML
          out: reports/owasp
          args: --failOnCVSS 9 --enableRetired
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/owasp/

  docker-and-zap:
    name: Docker Build and ZAP Scan
    runs-on: ubuntu-latest
    needs: [e2e, owasp]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devops-node-app:latest .

      - name: Start Container
        run: docker run -d -p 3000:3000 --name test-app devops-node-app:latest

      - name: Wait for Container
        run: sleep 10

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          allow_issue_writing: false

      - name: Stop Container
        run: docker stop test-app
        if: always()

  push-to-acr:
    name: Push to Azure Container Registry
    runs-on: ubuntu-latest
    needs: docker-and-zap
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Image
        run: docker build -t devops-node-app:latest .

      - name: Tag Image
        run: |
          docker tag devops-node-app:latest ${{ secrets.ACR_LOGIN_SERVER }}/devops-node-app:latest
          docker tag devops-node-app:latest ${{ secrets.ACR_LOGIN_SERVER }}/devops-node-app:${{ github.sha }}

      - name: Push to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/devops-node-app:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/devops-node-app:${{ github.sha }}